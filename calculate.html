<body>
<header>

<div class="logo">

<div class="title">

<h1>
Task 01 - Interactive<br>
Calculator

<p>

</div>
</header>

<div class="yellow-line"></div>

<div class="calculator">
<h2>
JAVASCRIPT CALCULATOR
</h2>

<div id="display">
0
</div>

<div class="buttons">

<button class="red" onclick="clearScreen()">C</button>

<button class="red" onclick="deleteNumber()">⌫</button>

<button class="operator" onclick="press('%')">%</button>

<button class="operator" onclick="press('/')">÷</button>

<button onclick="press('7')">7</button>

<button onclick="press('8')">8</button>

<button onclick="press('9')">9</button>

<button class="operator" onclick="press('*')">×</button>

<button onclick="press('4')">4</button>

<button onclick="press('5')">5</button>

<button onclick="press('6')">6</button>

<button class="operator" onclick="press('-')">−</button>

<button onclick="press('1')">1</button>

<button onclick="press('2')">2</button>

<button onclick="press('3')">3</button>

<button class="operator" onclick="press('+')">+</button>

<button class="zero" onclick="press('0')">
0
</button>


<button onclick="press('.')">
.
</button>

<button class="equal" onclick="result()">
=
</button>



</div>

</div>

<div class="shortcuts">


<h3>
Keyboard Shortcuts
</h3>


<p>

Use

<span>0-9</span>

for numbers,

<span>+ - * /</span>

for operators,

<span>Enter</span>

or

<span>=</span>

to calculate,

<span>Escape</span>

to clear,

<span>Backspace</span>

to delete.

</p>

</div>
